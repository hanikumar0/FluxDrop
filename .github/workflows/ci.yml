name: CI

on:
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Lint all services
      run: npx turbo lint

    - name: Run unit tests
      run: npx turbo test

    - name: Check Prisma schemas
      run: npx turbo prisma:check # Custom script to verify schema consistency
